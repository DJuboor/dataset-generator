# Dataset Generator — QA Task

provider:
  kind: openai
  base_url: ${DG_BASE_URL:-http://localhost:11434/v1}
  api_key: ${DG_API_KEY:-ollama}
  model: ${DG_MODEL:-llama3.1:8b}

type: qa
task:
  domain: "python programming"
  # contexts:                               # optional: provide reference texts
  #   - "Python is a high-level programming language..."
  #   - "The GIL prevents true parallelism in CPython..."

generation:
  num_samples: 100
  batch_size: 5
  max_workers: 10
  max_retries: 3
  temperature: 0.7
  strategy: direct                         # direct, few_shot, persona, cot, adversarial, evolinstruct
  # max_cost: 5.00                         # optional — budget cap in USD

# from_docs: ./docs                        # optional — generate QA pairs from your documents

quality:
  similarity_threshold: 0.85
  min_length: 10
  max_length: 10000
  # steps:                                 # optional — additional quality pipeline
  #   - pii: {action: remove}
  #   - language: {expected: en, action: remove}
  #   - diversity: {}

output:
  path: data/qa_output.jsonl
  format: jsonl                            # jsonl, csv, parquet, huggingface, openai, alpaca, sharegpt
