# Dataset Generator — SFT / Instruction-Following Task

provider:
  kind: openai
  base_url: ${DG_BASE_URL:-http://localhost:11434/v1}
  api_key: ${DG_API_KEY:-ollama}
  model: ${DG_MODEL:-llama3.1:8b}

type: sft
task:
  domain: "general knowledge"              # optional — focus area for instructions
  system_prompt: ""                        # optional — system prompt for the trained model
  complexity: mixed                        # easy, medium, hard, mixed
  response_style: detailed                 # concise, detailed, step_by_step

generation:
  num_samples: 100
  batch_size: 5
  max_workers: 10
  max_retries: 3
  temperature: 0.8
  strategy: direct                         # direct, few_shot, persona, cot, adversarial, evolinstruct
  # max_cost: 5.00                         # optional — budget cap in USD
  # strategy_config:                       # strategy-specific settings
  #   personas: ["teacher", "engineer"]    # for persona strategy
  #   examples: [{"instruction": "...", "response": "..."}]  # for few_shot

# from_docs: ./docs                        # optional — ground generation on local docs

quality:
  similarity_threshold: 0.85
  min_length: 20
  max_length: 10000
  # steps:                                 # optional — additional quality pipeline
  #   - pii: {action: remove}
  #   - language: {expected: en, action: remove}
  #   - diversity: {}

output:
  path: data/sft_output.jsonl
  format: jsonl                            # jsonl, csv, parquet, huggingface, openai, alpaca, sharegpt
