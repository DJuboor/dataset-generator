# Dataset Generator — NER Task

provider:
  kind: openai
  base_url: ${DG_BASE_URL:-http://localhost:11434/v1}
  api_key: ${DG_API_KEY:-ollama}
  model: ${DG_MODEL:-llama3.1:8b}

type: ner
task:
  entity_types: ["PERSON", "ORG", "LOC", "DATE"]
  domain: "news articles"

generation:
  num_samples: 100
  batch_size: 5
  max_workers: 10
  max_retries: 3
  temperature: 0.7
  strategy: persona                        # direct, few_shot, persona, cot, adversarial, evolinstruct
  # max_cost: 5.00                         # optional — budget cap in USD

# from_docs: ./docs                        # optional — extract entities from your documents

quality:
  similarity_threshold: 0.85
  min_length: 20
  max_length: 5000
  # steps:
  #   - pii: {action: remove}
  #   - language: {expected: en, action: remove}
  #   - diversity: {}

output:
  path: data/ner_output.jsonl
  format: jsonl                            # jsonl, csv, parquet, huggingface
